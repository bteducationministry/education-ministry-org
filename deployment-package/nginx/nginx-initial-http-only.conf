# ═══════════════════════════════════════════════════════════
# INITIAL HTTP-ONLY Config (use BEFORE obtaining SSL cert)
# After certbot succeeds, switch to app.educationministry.org.conf
# ═══════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name app.educationministry.org;

    root /var/www/education-ministry-org;
    index index.html;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    access_log /var/log/nginx/app.educationministry.org.access.log;
    error_log  /var/log/nginx/app.educationministry.org.error.log;
}
