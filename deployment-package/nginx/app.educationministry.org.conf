# ═══════════════════════════════════════════════════════════
# Nginx Virtual Host — app.educationministry.org
# Education Ministry React SPA
# ═══════════════════════════════════════════════════════════

# --- HTTP → HTTPS Redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name app.educationministry.org;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS Server ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.educationministry.org;

    # --- SSL Configuration ---
    # After running certbot, these paths will be correct:
    ssl_certificate     /etc/letsencrypt/live/app.educationministry.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.educationministry.org/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # --- Document Root ---
    root /var/www/education-ministry-org;
    index index.html;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Uncomment and configure CSP once all external resources are inventoried:
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://unpkg.com https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.educationministry.org;" always;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # --- SPA Routing Support ---
    # Hash-based routing (#/) doesn't require server-side rewrites,
    # but we add try_files as a safety net for direct URL access.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Static Asset Caching ---
    # CSS & JS — cache for 1 week (version via query string or file rename)
    location ~* \.(?:css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images — cache for 30 days
    location ~* \.(?:jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Fonts — cache for 1 year
    location ~* \.(?:woff|woff2|ttf|otf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Deny access to hidden files ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # --- Logging ---
    access_log /var/log/nginx/app.educationministry.org.access.log;
    error_log  /var/log/nginx/app.educationministry.org.error.log;
}
