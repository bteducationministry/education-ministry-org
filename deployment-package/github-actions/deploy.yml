# ═══════════════════════════════════════════════════════════
# GitHub Actions — Auto-deploy to Hostinger VPS
# Save as: .github/workflows/deploy.yml in your repo
# ═══════════════════════════════════════════════════════════
#
# Required GitHub Secrets:
#   VPS_HOST     — 72.62.80.207
#   VPS_USER     — root (or deploy user)
#   VPS_SSH_KEY  — Private SSH key for VPS access
#
# Setup:
#   1. Generate SSH key pair: ssh-keygen -t ed25519 -C "github-actions"
#   2. Add public key to VPS: ~/.ssh/authorized_keys
#   3. Add private key as GitHub secret: VPS_SSH_KEY
#   4. Add VPS_HOST and VPS_USER as GitHub secrets
# ═══════════════════════════════════════════════════════════

name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify critical files exist
        run: |
          echo "Checking critical files..."
          test -f index.html          || (echo "❌ index.html missing" && exit 1)
          test -f assets/js/app.js    || (echo "❌ app.js missing" && exit 1)
          test -f assets/js/config.js || (echo "❌ config.js missing" && exit 1)
          test -f assets/css/main.css || (echo "❌ main.css missing" && exit 1)
          echo "✅ All critical files present"

      - name: Verify production config
        run: |
          echo "Checking config.js for production safety..."
          # Ensure DEBUG is false in production config
          grep -q '"DEBUG":.*false' assets/js/config.js 2>/dev/null || \
          grep -q 'DEBUG:.*false' assets/js/config.js || \
          echo "⚠️ Warning: Verify DEBUG is false in production config"
          echo "✅ Config check complete"

      - name: Deploy to VPS via rsync
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          SOURCE: ./
          TARGET: /srv/platform/app.educationministry.org/
          EXCLUDE: |
            .git/
            .github/
            .gitignore
            docs/
            *.md
            *.pdf
            CNAME
            .abacus.donotdelete

      - name: Set permissions and reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            chown -R www-data:www-data /srv/platform/app.educationministry.org
            find /srv/platform/app.educationministry.org -type d -exec chmod 755 {} \;
            find /srv/platform/app.educationministry.org -type f -exec chmod 644 {} \;
            nginx -t && systemctl reload nginx
            echo "✅ Deployment complete and Nginx reloaded"

      - name: Health check
        run: |
          echo "Waiting 10s for deployment to stabilize..."
          sleep 10
          HTTP_CODE=$(curl -so /dev/null -w '%{http_code}' --max-time 15 https://app.educationministry.org || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Health check passed (HTTP $HTTP_CODE)"
          else
            echo "⚠️ Health check returned HTTP $HTTP_CODE (site may still be propagating)"
          fi
